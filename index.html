<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Thief</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Palette Thief</h1>
      <p class="subtitle">Type a hex color to steal a beautiful palette</p>
    </header>

    <div class="input-section">
      <div class="input-wrapper">
        <div class="color-preview" id="inputPreview"></div>
        <span class="hash">#</span>
        <input
          type="text"
          id="hexInput"
          maxlength="6"
          placeholder="e.g. FF6B6B"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="mode-tabs">
        <button class="tab active" data-mode="complementary">Complementary</button>
        <button class="tab" data-mode="analogous">Analogous</button>
        <button class="tab" data-mode="triadic">Triadic</button>
        <button class="tab" data-mode="shades">Shades</button>
      </div>
    </div>

    <div class="palette" id="palette"></div>

    <button class="regenerate-btn" id="regenerateBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      Regenerate Unlocked
    </button>

    <div class="toast" id="toast">Copied!</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
