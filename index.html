<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene" id="scene">
    <div class="glow" id="glow"></div>

    <h1 class="title">Vibe Timer</h1>

    <!-- Setup inputs (shown when idle) -->
    <div class="setup" id="setup">
      <div class="time-inputs">
        <div class="input-group">
          <input type="number" id="inputMin" min="0" max="99" value="0" placeholder="0">
          <label>min</label>
        </div>
        <div class="sep">:</div>
        <div class="input-group">
          <input type="number" id="inputSec" min="0" max="59" value="25" placeholder="0">
          <label>sec</label>
        </div>
      </div>
    </div>

    <!-- Ring -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 240 240" id="ringSvg">
        <circle class="ring-bg" cx="120" cy="120" r="104"/>
        <circle class="ring-fg" id="ringFg" cx="120" cy="120" r="104"
          stroke-dasharray="653.45"
          stroke-dashoffset="0"
          stroke-linecap="round"
          transform="rotate(-90 120 120)"/>
      </svg>

      <div class="ring-inner">
        <div class="time-display" id="timeDisplay">00:25</div>
        <div class="phase-label" id="phaseLabel">Ready</div>
      </div>

      <!-- Done overlay -->
      <div class="done-overlay" id="doneOverlay">
        <div class="done-text">Done</div>
        <div class="done-sub">Time's up!</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-reset" id="resetBtn" title="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.56"/></svg>
      </button>
      <button class="btn btn-main" id="mainBtn">Start</button>
      <button class="btn btn-ghost" id="lapBtn" title="Add 1 min">+1m</button>
    </div>

    <!-- Particles container -->
    <div class="particles" id="particles"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
